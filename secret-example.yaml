env: dev
documents:
  - path: app1/database
    fields:
      username: 'op://Dev/app1-db/username'
      password: "op://Dev/app1-db/password"
  - path: app1/api
    fields:
      api_key: op://Dev/app1-api/credential
  # Segments may contain spaces, dashes and other characters — use YAML
  # quoting if a value would otherwise be ambiguous to the YAML parser.
  - path: infra/secure-app
    fields:
      database_name: "op://Infrastructure/Customer - dev - secure-app/database_name"
      database_password: 'op://Infrastructure/Customer - dev - secure-app/database_password'
